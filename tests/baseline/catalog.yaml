# Trip-planner scenario catalog -- deterministic ranking/source-quality compute.
#
# Same shape as the TMP catalog, but the "directional" checks here are cross-entity
# ORDERINGS (one option/result vs another) rather than control-vs-variant.

fixtures:
  - coastal_flight.json
  - scenic_rail.json
  - island_ferry.json
  - regional_rental_car.json
  - downtown_local_ground.json
  - tests/fixtures/options/lodging/central_urban_hotel.json
  - tests/fixtures/options/lodging/vacation_rental.json
  - tests/fixtures/options/lodging/quiet_outer_area_hotel.json
  - tests/fixtures/options/lodging/conference_hotel.json
  - tests/fixtures/ranking/results/leisure_candidate_result.json
  - tests/fixtures/ranking/results/business_candidate_result.json

# Directional orderings -- each compares `left` vs `right` on a metric.
orderings:
  - id: leisure_anchor_alignment_stronger_than_business_policy_fit
    left: tests/fixtures/ranking/results/leisure_candidate_result.json
    right: tests/fixtures/ranking/results/business_candidate_result.json
    metric: anchor_alignment
    direction: greater_than
    enforce: true
  - id: leisure_quality_floor_stronger_than_business_fixture
    left: tests/fixtures/ranking/results/leisure_candidate_result.json
    right: tests/fixtures/ranking/results/business_candidate_result.json
    metric: quality_floor_fit
    direction: greater_than
    enforce: true
  - id: leisure_discovery_fit_stronger_than_business_fixture
    left: tests/fixtures/ranking/results/leisure_candidate_result.json
    right: tests/fixtures/ranking/results/business_candidate_result.json
    metric: discovery_fit
    direction: greater_than
    enforce: true
  - id: central_inventory_fresher_than_untrusted_rental
    left: tests/fixtures/options/lodging/central_urban_hotel.json
    right: tests/fixtures/options/lodging/vacation_rental.json
    metric: freshness_confidence
    direction: greater_than
    enforce: true
  - id: central_inventory_more_commercial_than_untrusted_rental
    left: tests/fixtures/options/lodging/central_urban_hotel.json
    right: tests/fixtures/options/lodging/vacation_rental.json
    metric: commerciality
    direction: greater_than
    enforce: true
  - id: quiet_hotel_higher_quality_than_rental
    left: tests/fixtures/options/lodging/quiet_outer_area_hotel.json
    right: tests/fixtures/options/lodging/vacation_rental.json
    metric: quality_signal
    direction: greater_than
    enforce: true
  - id: rental_higher_value_than_central_hotel
    left: tests/fixtures/options/lodging/vacation_rental.json
    right: tests/fixtures/options/lodging/central_urban_hotel.json
    metric: value_signal
    direction: greater_than
    enforce: true
  - id: conference_hotel_higher_fit_than_central_hotel
    left: tests/fixtures/options/lodging/conference_hotel.json
    right: tests/fixtures/options/lodging/central_urban_hotel.json
    metric: fit_signal
    direction: greater_than
    enforce: true
  - id: leisure_ranking_higher_input_coverage_than_business_fixture
    left: tests/fixtures/ranking/results/leisure_candidate_result.json
    right: tests/fixtures/ranking/results/business_candidate_result.json
    metric: input_coverage
    direction: greater_than
    enforce: true
  - id: leisure_ranking_higher_scoring_stability_than_business_fixture
    left: tests/fixtures/ranking/results/leisure_candidate_result.json
    right: tests/fixtures/ranking/results/business_candidate_result.json
    metric: scoring_stability
    direction: greater_than
    enforce: true
  - id: rail_better_overall_fit_than_flight
    left: scenic_rail.json
    right: coastal_flight.json
    metric: overall_signal
    direction: greater_than
    enforce: true
  - id: flight_better_schedule_fit_than_car
    left: coastal_flight.json
    right: regional_rental_car.json
    metric: schedule_fit_signal
    direction: greater_than
    enforce: true
  - id: flight_better_friction_fit_than_car
    left: coastal_flight.json
    right: regional_rental_car.json
    metric: friction_fit_signal
    direction: greater_than
    enforce: true
  - id: ground_better_policy_fit_than_ferry
    left: downtown_local_ground.json
    right: island_ferry.json
    metric: policy_fit_signal
    direction: greater_than
    enforce: true

# The must-cover metric dimensions (coverage manifest asserts these appear in
# at least one ordering).
priority_metrics:
  - anchor_alignment
  - quality_floor_fit
  - discovery_fit
  - freshness_confidence
  - commerciality
  - fit_signal
  - value_signal
  - quality_signal
  - input_coverage
  - scoring_stability
  - schedule_fit_signal
  - friction_fit_signal
  - policy_fit_signal
  - overall_signal
