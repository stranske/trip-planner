version: 1

default_agent: codex

# Shared keepalive marker prefix (agent-agnostic)
keepalive_marker_prefix: agent-keepalive

execution_profiles:
  codex-default:
    agent: codex
    model: gpt-5.5
    fallback_model: gpt-5.4
    runner: reusable-codex-run
    capacity_pool: codex-standard
    safety: standard
    lifecycle: active
  codex-fast:
    agent: codex
    model: gpt-5.4
    fallback_model: gpt-5.5
    runner: reusable-codex-run
    capacity_pool: codex-standard
    safety: standard
    lifecycle: active

agents:
  codex:
    runner_workflow: .github/workflows/reusable-codex-run.yml
    required_secrets:
      - CODEX_AUTH_JSON
    branch_prefix: codex/issue-
    capacity:
      window: 5h
      limit: 1  # TODO: confirm owner-supplied public plan limit
    ui_mentions_allowed: false
    automation_logins:
      - chatgpt-codex-connector
    readiness_candidates:
      - chatgpt-codex-connector
    preflight:
      assign_user: chatgpt-codex-connector
      command_phrase: ''
      enabled: true
    capabilities:
      pr_keepalive: true
      pr_autofix: true
      belt: true
      verifier_checkbox: true

  claude:
    runner_workflow: .github/workflows/reusable-claude-run.yml
    required_secrets:
      - CLAUDE_CODE_OAUTH_TOKEN  # preferred: long-lived token from `claude setup-token`
      - CLAUDE_AUTH_JSON          # fallback: credentials.json (short-lived OAuth)
    required_secrets_mode: any    # at least one must be present
    branch_prefix: claude/issue-
    capacity:
      window: 5h
      limit: 1  # TODO: confirm owner-supplied public plan limit
    ui_mentions_allowed: false
    automation_logins:
      - stranske-automation-bot
    readiness_candidates:
      - stranske-automation-bot
    preflight:
      assign_user: stranske-automation-bot
      command_phrase: ''
      enabled: true
    capabilities:
      pr_keepalive: true
      pr_autofix: true
      belt: true
      verifier_checkbox: true

  cursor:
    runner_workflow: .github/workflows/reusable-cursor-run.yml
    required_secrets:
      - CURSOR_API_KEY
    branch_prefix: cursor/issue-
    capacity:
      window: daily
      limit: 1  # TODO: confirm owner-supplied public plan limit
    ui_mentions_allowed: false
    # Reuses stranske-automation-bot for branch pushes/attribution until a
    # dedicated stranske-cursor-bot service account is provisioned.
    automation_logins:
      - stranske-automation-bot
    readiness_candidates:
      - stranske-automation-bot
    preflight:
      assign_user: stranske-automation-bot
      command_phrase: ''
      enabled: false   # issue-intake/invite flow deferred; PR keepalive + autofix only this phase
    capabilities:
      pr_keepalive: true
      pr_autofix: true          # wired into agents-autofix-loop.yml (autofix-cursor job)
      belt: false              # belt routing deferred to a later phase
      verifier_checkbox: false  # verification stays on the existing judge (config/llm_slots.json)

  gemini:
    enabled: true
    runner_workflow: .github/workflows/reusable-gemini-run.yml
    required_secrets:
      - GEMINI_API_KEY
    branch_prefix: gemini/issue-
    capacity:
      window: daily
      limit: 1  # TODO: confirm owner-supplied public plan limit
    ui_mentions_allowed: false
    # Reuses stranske-automation-bot for branch pushes/attribution until a
    # dedicated service account is provisioned.
    automation_logins:
      - stranske-automation-bot
    readiness_candidates:
      - stranske-automation-bot
    preflight:
      assign_user: stranske-automation-bot
      command_phrase: ''
      enabled: false   # issue-intake/invite flow deferred; PR keepalive only this phase
    capabilities:
      pr_keepalive: true
      pr_autofix: false         # autofix-loop wiring deferred
      belt: false
      verifier_checkbox: false  # verification stays on the existing judge (config/llm_slots.json)

  aider:
    enabled: false
    runner_workflow: ''
    required_secrets:
      - AIDER_API_KEY
    branch_prefix: aider/issue-
    capacity:
      window: daily
      limit: 1  # TODO: confirm owner-supplied public plan limit
    ui_mentions_allowed: false
    automation_logins:
      - stranske-automation-bot
    readiness_candidates:
      - stranske-automation-bot
    preflight:
      assign_user: stranske-automation-bot
      command_phrase: ''
      enabled: false
    capabilities:
      pr_keepalive: false
      pr_autofix: false
      belt: false
      verifier_checkbox: false
