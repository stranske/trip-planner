# -----------------------------------------------------------------------------
# Gate Workflow — Consumer Repository Template
# -----------------------------------------------------------------------------
# Orchestrates CI enforcement for pull requests. The `summary` job aggregates
# results and publishes the commit status that keepalive automation relies on.
#
# USAGE:
#   - Standard Python projects: Use this template as-is
#   - Custom projects: Use as a STARTING POINT, customize the test job(s)
#
# IMPORTANT: The `summary` job and `Gate / gate` commit status are REQUIRED
# for keepalive automation to detect CI results. Do not remove or rename them.
#
# SYNC BEHAVIOR:
#   - This file is NOT auto-synced to repos with custom Gate workflows
#   - Repos in CUSTOM_GATE_REPOS list in maint-68-sync-consumer-repos.yml
#     maintain their own Gate and should update manually if needed
#
# Copy this file to: .github/workflows/pr-00-gate.yml
#
# Required secrets: None (uses GITHUB_TOKEN)
# Optional secrets: Passed via `secrets: inherit` to reusable workflow
#
# Examples of custom Gates based on this template:
#   - stranske/Manager-Database (FastAPI + docker-compose)
# -----------------------------------------------------------------------------

name: Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref_name }}-gate
  cancel-in-progress: true

jobs:
  detect:
    name: classify changed paths
    runs-on: ubuntu-latest
    outputs:
      is_docs_only: ${{ steps.classify.outputs.is-docs-only || 'false' }}
      is_python_code: ${{ steps.classify.outputs.is-python-code || 'true' }}
      is_workflow_change: ${{ steps.classify.outputs.is-workflow-change || 'false' }}
      is_security_relevant: ${{ steps.classify.outputs.is-security-relevant || 'true' }}
      classification_rationale: ${{ steps.classify.outputs.classification-rationale || 'path classifier unavailable' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Classify changed paths
        id: classify
        uses: ./.github/actions/path-classifier
        with:
          force-full: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'verify:full') || github.event_name == 'schedule' }}

  python-ci:
    name: Python CI
    needs: detect
    if: >-
      ${{
        needs.detect.outputs.is_docs_only != 'true' &&
        needs.detect.outputs.is_python_code == 'true'
      }}
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      coverage-min: "8"
      format_check: false  # Using ruff for formatting
      working-directory: "."
      artifact-prefix: "gate-"
      # Enable soft coverage gate for trend tracking and hotspot reporting
      enable-soft-gate: true
    secrets: inherit

  cross-repo-smoke:
    name: Cross-Repo Smoke
    needs: detect
    if: ${{ needs.detect.outputs.is_docs_only != 'true' }}
    uses: ./.github/workflows/cross-repo-smoke.yml
    secrets: inherit

  runtime-ci:
    name: Runtime CI
    needs: detect
    if: ${{ needs.detect.outputs.is_docs_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Verify full-stack runtime
        run: ./scripts/check_full_stack_runtime.sh

  summary:
    name: gate-summary
    needs: [detect, python-ci, runtime-ci, cross-repo-smoke]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    outputs:
      state: ${{ steps.summarize.outputs.state }}
      description: ${{ steps.summarize.outputs.description }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Summarize results
        id: summarize
        env:
          DETECT_RESULT: ${{ needs.detect.result || 'skipped' }}
          PYTHON_RESULT: ${{ needs.python-ci.result || 'skipped' }}
          RUNTIME_RESULT: ${{ needs.runtime-ci.result || 'skipped' }}
          CROSS_REPO_RESULT: ${{ needs.cross-repo-smoke.result || 'skipped' }}
        run: |
          set -euo pipefail

          python_result="${PYTHON_RESULT:-skipped}"
          runtime_result="${RUNTIME_RESULT:-skipped}"
          cross_repo_result="${CROSS_REPO_RESULT:-skipped}"
          state="success"
          description="All checks passed"

          if [ "$python_result" = "failure" ]; then
            state="failure"
            description="Python CI failed"
          elif [ "$runtime_result" = "failure" ]; then
            state="failure"
            description="Runtime CI failed"
          elif [ "$cross_repo_result" = "failure" ]; then
            state="failure"
            description="Cross-repo smoke check failed"
          elif [ "$python_result" = "cancelled" ] || [ "$runtime_result" = "cancelled" ] || [ "$cross_repo_result" = "cancelled" ]; then
            state="error"
            description="Checks were cancelled"
          elif [ "$python_result" = "success" ] && [ "$runtime_result" = "success" ] && [ "$cross_repo_result" = "success" ]; then
            state="success"
            description="Python, runtime, and cross-repo CI passed"
          elif [ "$python_result" = "success" ] && [ "$runtime_result" = "skipped" ] && [ "$cross_repo_result" = "skipped" ]; then
            state="success"
            description="Python CI passed; runtime and cross-repo CI skipped"
          elif [ "$python_result" = "skipped" ] && [ "$runtime_result" = "success" ] && [ "$cross_repo_result" = "skipped" ]; then
            state="success"
            description="Runtime CI passed; Python and cross-repo CI skipped"
          elif [ "$python_result" = "skipped" ] && [ "$runtime_result" = "skipped" ] && [ "$cross_repo_result" = "skipped" ]; then
            state="success"
            description="Checks skipped (no relevant changes)"
          else
            state="pending"
            description="Checks still running"
          fi

          detect_result="${DETECT_RESULT:-skipped}"
          if [[ "${detect_result}" != "success" ]]; then
            if [[ "${detect_result}" == "failure" ]]; then
              state="failure"
              description="Path classification failed"
            elif [[ "${detect_result}" == "cancelled" ]]; then
              state="error"
              description="Path classification was cancelled"
            else
              state="pending"
              description="Path classification status unknown"
            fi
          fi

          echo "state=${state}" >> "$GITHUB_OUTPUT"
          echo "description=${description}" >> "$GITHUB_OUTPUT"
          echo "[Gate] State: ${state}, Description: ${description}"

      - name: Report Gate commit status
        if: ${{ always() }}
        uses: actions/github-script@v9.0.0
        env:
          STATE: ${{ steps.summarize.outputs.state || 'pending' }}
          DESCRIPTION: ${{ steps.summarize.outputs.description || 'Gate status pending' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request?.head?.sha ?? context.sha;
            const rawState = process.env.STATE || 'pending';
            const allowed = new Set(['error', 'failure', 'pending', 'success']);
            const state = allowed.has(rawState) ? rawState : 'pending';
            const rawDescription = process.env.DESCRIPTION || 'Gate status update';
            const description = rawDescription.length > 140 ? `${rawDescription.slice(0, 137)}...` : rawDescription;
            const targetUrl = process.env.TARGET_URL;

            try {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: 'Gate / gate',
                description,
                target_url: targetUrl,
              });
              console.log(`Created commit status: ${state} - ${description}`);
            } catch (error) {
              const hitRateLimit = error?.status === 403 && /rate limit/i.test(error?.message || '');
              if (hitRateLimit) {
                core.warning('Rate limit prevented Gate from updating the commit status.');
              } else {
                throw error;
              }
            }

      - name: Enforce Gate success
        if: ${{ steps.summarize.outputs.state == 'failure' }}
        run: |
          echo "Gate reported failure: ${{ steps.summarize.outputs.description }}" >&2
          exit 1
