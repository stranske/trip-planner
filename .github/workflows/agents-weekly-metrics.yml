name: agents-weekly-metrics

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  aggregate:
    name: Aggregate agent metrics
    runs-on: ubuntu-latest
    environment: agent-standard
    steps:
      # Mint GitHub App token early to use for API calls (avoids rate limits)
      - name: Mint GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.WORKFLOWS_APP_ID || '0' }}
          private-key: ${{ secrets.WORKFLOWS_APP_PRIVATE_KEY || 'dummy' }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:

          token: ${{ steps.app_token.outputs.token || github.token }}
          sparse-checkout: |
            .github/actions/setup-api-client
            .github/scripts/bot_comment_auth_coverage.js
            .github/scripts/github-api-with-retry.js
            .github/scripts/terminal_disposition.js
            .github/scripts/terminal_disposition_coverage.js
            .github/scripts/token_load_balancer.js
            .github/scripts/weekly_metrics_artifacts.js
            .github/scripts/weekly_metrics_download_manifest.js
            scripts/aggregate_agent_metrics.py
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Setup API client
        uses: ./.github/actions/setup-api-client
        with:
          secrets: ${{ toJSON(secrets) }}
          github_token: ${{ github.token }}



      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Download metrics artifacts
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1009,SC1073,SC1039,SC1072
          mkdir -p artifacts

          # Get artifact IDs and names
          # shellcheck disable=SC1009,SC1073,SC1039,SC1072
          artifact_list="artifacts/metric-artifacts.tsv"
          selection_report="artifacts/metric-artifacts-selection.json"
          selection_markdown="artifacts/metric-artifacts-selection.md"
          download_manifest="artifacts/metric-artifact-download-manifest.json"
          download_manifest_markdown="artifacts/metric-artifact-download-manifest.md"
          set +e
          node .github/scripts/weekly_metrics_artifacts.js \
            --output "$artifact_list" \
            --report "$selection_report" \
            --markdown "$selection_markdown"
          selector_status=$?
          set -e
          if [ -f "$selection_report" ]; then
            cat "$selection_report"
          fi
          node .github/scripts/weekly_metrics_download_manifest.js \
            --init \
            --selection "$selection_report" \
            --manifest "$download_manifest" \
            --markdown "$download_manifest_markdown"
          if [ "$selector_status" != "0" ]; then
            exit "$selector_status"
          fi
          if [ ! -s "$artifact_list" ]; then
            echo "No metrics artifacts found"
          fi
          while IFS=$'\t' read -r id name; do
            echo "Downloading artifact $id ($name)"
            safe_name="$(node -e 'const name = process.argv[1] || ""; const safe = name.trim().replace(/[\\\\/]+/g, "_").replace(/[^A-Za-z0-9._-]/g, "_").replace(/\.\.+/g, "_").replace(/^\.{1,2}$/, "_") || "unknown"; process.stdout.write(safe);' "$name")"
            artifact_dir="artifacts/$safe_name/$id"
            mkdir -p "$artifact_dir"
            # shellcheck disable=SC1009,SC1073,SC1039,SC1072
            export ARTIFACT_ID="$id"
            export ARTIFACT_DIR="$artifact_dir"
            export ARTIFACT_ZIP="$artifact_dir/$id.zip"
            if ! node - <<'NODE'
          const fs = require('fs');
          const { Octokit } = require('@octokit/rest');
          const { createTokenAwareRetry } = require('./.github/scripts/github-api-with-retry.js');
          const core = { info: () => {}, warning: console.warn, debug: () => {} };
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const artifactId = Number(process.env.ARTIFACT_ID);
          const zipPath = process.env.ARTIFACT_ZIP;
          (async () => {
            const token = process.env.GH_TOKEN ||
              process.env.GITHUB_TOKEN;
            const github = new Octokit({ auth: token });
            const { withRetry } = await createTokenAwareRetry({
              github,
              core,
              env: process.env,
              task: 'agents-weekly-metrics-download',
              capabilities: ['actions:read']
            });
            const response = await withRetry((client) => client.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifactId,
              archive_format: 'zip'
            }));
            const data = response.data;
            const buffer = Buffer.isBuffer(data)
              ? data
              : Buffer.from(data instanceof ArrayBuffer ? new Uint8Array(data) : data);
            fs.writeFileSync(zipPath, buffer);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
            then
              echo "Warning: Could not download artifact $id ($name)"
              node .github/scripts/weekly_metrics_download_manifest.js \
                --record \
                --manifest "$download_manifest" \
                --markdown "$download_manifest_markdown" \
                --id "$id" \
                --name "$name" \
                --artifact-dir "$ARTIFACT_DIR" \
                --zip-path "$ARTIFACT_ZIP" \
                --download-status failed \
                --download-error download-command-failed \
                --unzip-status skipped \
                --unzip-error download-failed
              continue
            fi
            zip_bytes="$(wc -c < "$ARTIFACT_ZIP" | tr -d ' ')"
            if unzip -o "$ARTIFACT_ZIP" -d "$ARTIFACT_DIR" >/dev/null; then
              node .github/scripts/weekly_metrics_download_manifest.js \
                --record \
                --manifest "$download_manifest" \
                --markdown "$download_manifest_markdown" \
                --id "$id" \
                --name "$name" \
                --artifact-dir "$ARTIFACT_DIR" \
                --zip-path "$ARTIFACT_ZIP" \
                --zip-bytes "$zip_bytes" \
                --download-status pass \
                --unzip-status pass
            else
              echo "Warning: Could not unzip artifact $id ($name)"
              node .github/scripts/weekly_metrics_download_manifest.js \
                --record \
                --manifest "$download_manifest" \
                --markdown "$download_manifest_markdown" \
                --id "$id" \
                --name "$name" \
                --artifact-dir "$ARTIFACT_DIR" \
                --zip-path "$ARTIFACT_ZIP" \
                --zip-bytes "$zip_bytes" \
                --download-status pass \
                --unzip-status failed \
                --unzip-error unzip-command-failed
            fi
          done < "$artifact_list"
          node .github/scripts/weekly_metrics_download_manifest.js \
            --finalize \
            --manifest "$download_manifest" \
            --markdown "$download_manifest_markdown"

      - name: Aggregate metrics
        env:
          METRICS_DIR: artifacts
          OUTPUT_PATH: agent-weekly-metrics.md
          OUTPUT_JSON_PATH: agent-weekly-metrics.json
        run: |
          python scripts/aggregate_agent_metrics.py

      - name: Attach artifact selection summary
        run: |
          if [ -f artifacts/metric-artifacts-selection.md ]; then
            cat artifacts/metric-artifacts-selection.md >> "$GITHUB_STEP_SUMMARY"
            if [ -f agent-weekly-metrics.md ]; then
              {
                printf '\n'
                cat artifacts/metric-artifacts-selection.md
              } >> agent-weekly-metrics.md
            fi
          fi
          if [ -f artifacts/metric-artifact-download-manifest.md ]; then
            cat artifacts/metric-artifact-download-manifest.md >> "$GITHUB_STEP_SUMMARY"
            if [ -f agent-weekly-metrics.md ]; then
              {
                printf '\n'
                cat artifacts/metric-artifact-download-manifest.md
              } >> agent-weekly-metrics.md
            fi
          fi

      - name: Review-thread terminal coverage preflight
        env:
          TERMINAL_DISPOSITION_METRICS_DIR: artifacts
          TERMINAL_DISPOSITION_ARTIFACT_SELECTION_JSON: artifacts/metric-artifacts-selection.json
          TERMINAL_DISPOSITION_COVERAGE_JSON: terminal-disposition-coverage.json
          TERMINAL_DISPOSITION_COVERAGE_MD: terminal-disposition-coverage.md
          TERMINAL_DISPOSITION_COVERAGE_MODE: >-
            ${{ vars.TERMINAL_DISPOSITION_COVERAGE_MODE || 'warning-only' }}
          TERMINAL_DISPOSITION_HARD_BLOCK_APPROVED: >-
            ${{ vars.TERMINAL_DISPOSITION_HARD_BLOCK_APPROVED || 'false' }}
        run: |
          set +e
          node .github/scripts/terminal_disposition_coverage.js
          terminal_coverage_status=$?
          set -e
          if [ -f terminal-disposition-coverage.md ]; then
            cat terminal-disposition-coverage.md >> "$GITHUB_STEP_SUMMARY"
            if [ -f agent-weekly-metrics.md ]; then
              {
                printf '\n'
                cat terminal-disposition-coverage.md
              } >> agent-weekly-metrics.md
            fi
          fi
          echo \
            "TERMINAL_DISPOSITION_COVERAGE_EXIT_STATUS=${terminal_coverage_status}" \
            >> "$GITHUB_ENV"

      - name: Bot-comment auth coverage preflight
        env:
          BOT_COMMENT_AUTH_COVERAGE_DIR: artifacts
          BOT_COMMENT_AUTH_ARTIFACT_SELECTION_JSON: artifacts/metric-artifacts-selection.json
          BOT_COMMENT_AUTH_COVERAGE_JSON: bot-comment-auth-coverage-summary.json
          BOT_COMMENT_AUTH_COVERAGE_MD: bot-comment-auth-coverage-summary.md
          BOT_COMMENT_AUTH_COVERAGE_MODE: >-
            ${{ vars.BOT_COMMENT_AUTH_COVERAGE_MODE || 'warning-only' }}
          BOT_COMMENT_AUTH_HARD_BLOCK_APPROVED: >-
            ${{ vars.BOT_COMMENT_AUTH_HARD_BLOCK_APPROVED || 'false' }}
          BOT_COMMENT_WRAPPER_EXPECTED_AUTH_MODE: >-
            ${{ vars.BOT_COMMENT_WRAPPER_EXPECTED_AUTH_MODE || 'client-id' }}
          BOT_COMMENT_WRAPPER_ALLOWED_AUTH_MODES: >-
            ${{ vars.BOT_COMMENT_WRAPPER_ALLOWED_AUTH_MODES || 'client-id' }}
          BOT_COMMENT_REUSABLE_EXPECTED_AUTH_MODE: >-
            ${{ vars.BOT_COMMENT_REUSABLE_EXPECTED_AUTH_MODE }}
          BOT_COMMENT_REUSABLE_ALLOWED_AUTH_MODES: >-
            ${{ vars.BOT_COMMENT_REUSABLE_ALLOWED_AUTH_MODES || 'client-id,none' }}
          BOT_COMMENT_AUTH_REQUIRED_ORGANIC_EVENTS: >-
            ${{ vars.BOT_COMMENT_AUTH_REQUIRED_ORGANIC_EVENTS || 'pull_request,workflow_run' }}
          BOT_COMMENT_AUTH_ORGANIC_COMPONENTS: >-
            ${{
              vars.BOT_COMMENT_AUTH_ORGANIC_COMPONENTS ||
              'agents-bot-comment-handler-wrapper,reusable-bot-comment-handler'
            }}
          BOT_COMMENT_AUTH_ORGANIC_EXPECTED_MODE: >-
            ${{ vars.BOT_COMMENT_AUTH_ORGANIC_EXPECTED_MODE || 'client-id' }}
        run: |
          set +e
          node .github/scripts/bot_comment_auth_coverage.js
          bot_comment_auth_status=$?
          set -e
          if [ -f bot-comment-auth-coverage-summary.md ]; then
            cat bot-comment-auth-coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
            if [ -f agent-weekly-metrics.md ]; then
              {
                printf '\n'
                cat bot-comment-auth-coverage-summary.md
              } >> agent-weekly-metrics.md
            fi
          fi
          echo "BOT_COMMENT_AUTH_COVERAGE_EXIT_STATUS=${bot_comment_auth_status}" >> "$GITHUB_ENV"

      - name: Upload weekly summary
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent-weekly-metrics
          path: |
            agent-weekly-metrics.md
            agent-weekly-metrics.json
            artifacts/metric-artifacts-selection.json
            artifacts/metric-artifacts-selection.md
            artifacts/metric-artifact-download-manifest.json
            artifacts/metric-artifact-download-manifest.md
            terminal-disposition-coverage.json
            terminal-disposition-coverage.md
            bot-comment-auth-coverage-summary.json
            bot-comment-auth-coverage-summary.md
          if-no-files-found: warn
          retention-days: 30

      - name: Post summary to tracking issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.app_token.outputs.token || github.token }}
          script: |
            const fs = require('fs');
            const retryHelperPath = './.github/scripts/github-api-with-retry.js';
            const retryHelpers = fs.existsSync(retryHelperPath)
              ? require(retryHelperPath)
              : {
                  withRetry: (fn) => fn(),
                  paginateWithRetry: (githubInstance, method, params) =>
                    githubInstance.paginate(method, params),
                };
            const { withRetry, paginateWithRetry } = retryHelpers;
            const { owner, repo } = context.repo;
            const summaryPath = 'agent-weekly-metrics.md';
            const body = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : 'No metrics available.';
            const title = 'Agent metrics weekly summary';

            const issues = await paginateWithRetry(github, github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            let target = issues.find((issue) => issue.title === title);

            if (!target) {
              const created = await withRetry(() => github.rest.issues.create({
                owner,
                repo,
                title,
                body: 'Tracking issue for weekly agent workflow metrics.\n\n' + body,
              }));
              target = created.data;
            } else {
              await withRetry(() => github.rest.issues.createComment({
                owner,
                repo,
                issue_number: target.number,
                body,
              }));
            }

            core.setOutput('issue_number', target.number);

      - name: Honor coverage hard-blocks
        if: ${{ always() }}
        run: |
          terminal_status="${TERMINAL_DISPOSITION_COVERAGE_EXIT_STATUS:-0}"
          bot_comment_auth_status="${BOT_COMMENT_AUTH_COVERAGE_EXIT_STATUS:-0}"
          if [ "${terminal_status}" != "0" ] || [ "${bot_comment_auth_status}" != "0" ]; then
            echo "::error title=Coverage hard-block failed::" \
              "terminal-disposition-exit-status=${terminal_status}; " \
              "bot-comment-auth-exit-status=${bot_comment_auth_status}; " \
              "coverage reports were uploaded before this failure"
            if [ "${terminal_status}" != "0" ]; then
              echo "Failed check: Review-thread terminal coverage preflight"
            fi
            if [ "${bot_comment_auth_status}" != "0" ]; then
              echo "Failed check: Bot-comment auth coverage preflight"
            fi
            exit 1
          fi
