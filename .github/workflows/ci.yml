# Thin caller for Python CI - delegates to Workflows repo reusable workflow
# No local scripts required - all logic is centralized in stranske/Workflows
#
# This workflow runs:
# - Lint (Ruff)
# - Format check (Black)
# - Type checking (mypy)
# - Tests (pytest) on Python 3.12 and 3.13
#
# NOTE: Do NOT add a top-level 'permissions:' block here. It causes
# startup_failure when calling reusable workflows. The reusable workflow
# defines its own permissions.
#
# Copy this file to: .github/workflows/ci.yml
# Also copy: autofix-versions.env to .github/workflows/autofix-versions.env
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python CI
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      format_check: false
      typecheck: true
      coverage: true
      # Floor set to measured backend baseline (89% on 2026-05-31), rounded down
      # to 88 for cross-version (3.12/3.13) headroom. See docs/CI_SYSTEM_GUIDE.md.
      coverage-min: '88'
    secrets: inherit

  runtime:
    name: Runtime CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Verify full-stack runtime
        run: ./scripts/check_full_stack_runtime.sh
