services:
  - type: web
    name: trip-planner-api
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e .
    startCommand: uvicorn trip_planner.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: TRIP_PLANNER_ENV
        value: staging
      - key: TRIP_PLANNER_DATABASE_URL
        fromDatabase:
          name: trip-planner-db
          property: connectionString
      - key: TRIP_PLANNER_CORS_ORIGINS
        sync: false
      - key: TRIP_PLANNER_CORS_ORIGIN_REGEX
        sync: false
      - key: TPP_BASE_URL
        sync: false
      - key: TPP_ACCESS_TOKEN
        sync: false
      - key: TPP_OIDC_PROVIDER
        sync: false

databases:
  - name: trip-planner-db
    # Paid instance: free Render Postgres expires + is deleted after ~30 days,
    # which suspended this DB and crashed deploys. Upgraded to basic-256mb so the
    # Blueprint matches the dashboard and a sync can't revert it to free.
    plan: basic-256mb
    databaseName: trip_planner
